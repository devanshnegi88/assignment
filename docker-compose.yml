version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: '1'
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "4173:4173"
    environment:
      VITE_API_BASE_URL: "http://backend:8000"
    depends_on:
      - backend
    restart: unless-stopped
